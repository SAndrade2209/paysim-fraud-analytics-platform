version: 2

models:
  - name: dim_dates
    description: Calendar date dimension used for time-based analytics.
    columns:
      - name: date_key
        description: Surrogate integer key in YYYYMMDD format.
        tests:
          - unique
          - not_null
      - name: date_day
        description: Actual calendar date.
        tests:
          - not_null

  - name: dim_accounts
    description: Unique list of accounts derived from PaySim transactions.
    columns:
      - name: account_id
        description: Natural business identifier from source system.
        tests:
          - unique
          - not_null
      - name: account_role
        description: Role of the account — customer (C) or merchant (M).
        tests:
          - not_null
          - accepted_values:
              values: ['customer', 'merchant', 'unknown']
      - name: first_seen_date_key
        description: Date key (YYYYMMDD) of first transaction involving this account.
        tests:
          - not_null
      - name: last_seen_date_key
        description: Date key (YYYYMMDD) of most recent transaction involving this account.
        tests:
          - not_null
      - name: is_active
        description: True if the account has been seen within the last 365 days.
        tests:
          - not_null

  - name: dim_transaction_types
    description: Reference table of transaction type codes and descriptions.
    columns:
      - name: transaction_type_code
        description: Uppercased transaction type code.
        tests:
          - unique
          - not_null
          - accepted_values:
              values: ['CASH_IN', 'CASH_OUT', 'DEBIT', 'PAYMENT', 'TRANSFER']
      - name: transaction_type_description
        description: Human-readable description of the transaction type.
        tests:
          - not_null
      - name: is_cash_related
        description: True if the transaction involves physical cash movement.
        tests:
          - not_null
